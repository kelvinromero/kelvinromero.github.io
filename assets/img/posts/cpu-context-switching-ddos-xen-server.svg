<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="red-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="amber-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="purple-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Title -->
  <text x="600" y="90" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="36" font-weight="700" fill="#f8fafc">CPU Context Switching Under DDoS</text>
  <text x="600" y="130" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" fill="#94a3b8">Performance degradation in Xen Server paravirtualized environments</text>

  <!-- Left panel: Normal -->
  <g transform="translate(80, 180)">
    <text x="220" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#22c55e">● Normal Operation</text>

    <!-- Interrupts bar -->
    <text x="0" y="45" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Interrupts</text>
    <rect x="0" y="55" width="440" height="24" rx="4" fill="#1e293b"/>
    <rect x="0" y="55" width="79" height="24" rx="4" fill="url(#red-grad)"/>
    <text x="90" y="72" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444">25,295</text>

    <!-- Context Switches bar -->
    <text x="0" y="105" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Context Switches</text>
    <rect x="0" y="115" width="440" height="24" rx="4" fill="#1e293b"/>
    <rect x="0" y="115" width="42" height="24" rx="4" fill="url(#amber-grad)"/>
    <text x="52" y="132" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">13,504</text>

    <!-- Conversion Rate bar -->
    <text x="0" y="165" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Conversion Rate</text>
    <rect x="0" y="175" width="440" height="24" rx="4" fill="#1e293b"/>
    <rect x="0" y="175" width="235" height="24" rx="4" fill="url(#purple-grad)"/>
    <text x="245" y="192" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa">53.39%</text>
  </g>

  <!-- Right panel: DDoS -->
  <g transform="translate(620, 180)">
    <text x="250" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ef4444">● Under DDoS Attack</text>

    <!-- Interrupts bar -->
    <text x="0" y="45" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Interrupts</text>
    <rect x="0" y="55" width="500" height="24" rx="4" fill="#1e293b"/>
    <rect x="0" y="55" width="440" height="24" rx="4" fill="url(#red-grad)"/>
    <text x="448" y="72" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444">141,157</text>

    <!-- Context Switches bar -->
    <text x="0" y="105" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Context Switches</text>
    <rect x="0" y="115" width="500" height="24" rx="4" fill="#1e293b"/>
    <rect x="0" y="115" width="297" height="24" rx="4" fill="url(#amber-grad)"/>
    <text x="307" y="132" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">95,369</text>

    <!-- Conversion Rate bar -->
    <text x="0" y="165" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Conversion Rate</text>
    <rect x="0" y="175" width="500" height="24" rx="4" fill="#1e293b"/>
    <rect x="0" y="175" width="338" height="24" rx="4" fill="url(#purple-grad)"/>
    <text x="348" y="192" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa">67.63%</text>
  </g>

  <!-- Divider -->
  <line x1="590" y1="190" x2="590" y2="420" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Key insight callout -->
  <rect x="300" y="440" width="600" height="70" rx="8" fill="#1e1b4b" opacity="0.6"/>
  <rect x="300" y="440" width="4" height="70" rx="2" fill="#a78bfa"/>
  <text x="600" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">+14.23% more interrupts converted to context switches</text>
  <text x="600" y="496" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">High-priority interrupts from DDoS flood force expensive CPU state transitions</text>

  <!-- Footer -->
  <text x="600" y="575" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">CONNEPI 2016 — 60 experiment rounds on Citrix XenServer 7.2 with vmstat on Dom0</text>
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#334155">kelvinromero.github.io</text>
</svg>
